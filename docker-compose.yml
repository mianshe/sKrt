version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-}
      TENANT_REQUIRE_HEADER: ${TENANT_REQUIRE_HEADER:-0}
      TENANT_HEADER_NAME: ${TENANT_HEADER_NAME:-X-Tenant-Id}
      TENANT_DEFAULT_ID: ${TENANT_DEFAULT_ID:-public}
      AUTH_JWT_ENABLED: ${AUTH_JWT_ENABLED:-0}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-}
      AUTH_JWT_JWKS_URL: ${AUTH_JWT_JWKS_URL:-}
      AUTH_JWT_LEEWAY_SECONDS: ${AUTH_JWT_LEEWAY_SECONDS:-60}
      AUTH_REQUIRE_MEMBERSHIP_CHECK: ${AUTH_REQUIRE_MEMBERSHIP_CHECK:-1}
      AUTH_TENANT_CLAIM_KEY: ${AUTH_TENANT_CLAIM_KEY:-tenant_id}
      AUTH_ROLES_CLAIM_KEY: ${AUTH_ROLES_CLAIM_KEY:-roles}
      AUTH_PERMISSIONS_CLAIM_KEY: ${AUTH_PERMISSIONS_CLAIM_KEY:-permissions}
      PADDLEOCR_USE_GPU: ${PADDLEOCR_USE_GPU:-0}
      CAPACITY_DISK_SOFT_LIMIT_BYTES: ${CAPACITY_DISK_SOFT_LIMIT_BYTES:-3221225472}
      CAPACITY_DISK_HARD_LIMIT_BYTES: ${CAPACITY_DISK_HARD_LIMIT_BYTES:-1073741824}
      CAPACITY_PAUSE_ON_HARD_LIMIT: ${CAPACITY_PAUSE_ON_HARD_LIMIT:-1}
      CHAT_MEMORY_TTL_SECONDS: ${CHAT_MEMORY_TTL_SECONDS:-0}
      CHAT_MEMORY_RECENT_LIMIT: ${CHAT_MEMORY_RECENT_LIMIT:-6}
      TENANT_DEFAULT_MAX_DOCUMENTS: ${TENANT_DEFAULT_MAX_DOCUMENTS:-1000}
      TENANT_DEFAULT_MAX_VECTORS: ${TENANT_DEFAULT_MAX_VECTORS:-1000000}
      TENANT_DEFAULT_MAX_STORAGE_BYTES: ${TENANT_DEFAULT_MAX_STORAGE_BYTES:-3221225472}
    volumes:
      - ./data:/app/data
